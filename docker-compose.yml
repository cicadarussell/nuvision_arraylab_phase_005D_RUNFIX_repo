services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: arraylab
      POSTGRES_USER: arraylab
      POSTGRES_PASSWORD: arraylab
    ports:
      - "5432:5432"
    volumes:
      - arraylab_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    env_file: .env.example
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
      - ./storage:/app/storage

volumes:
  arraylab_pgdata:
